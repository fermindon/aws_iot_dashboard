AWSTemplateFormatVersion: '2010-09-09'
Description: Static website hosted on S3 + CloudFront (minimal)

Resources:
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      AccessControl: Private

  OriginAccessIdentity:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: Access identity for static site

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              CanonicalUser: !GetAtt OriginAccessIdentity.S3CanonicalUserId
            Action: s3:GetObject
            Resource: !Sub arn:aws:s3:::${WebsiteBucket}/*

  MainCloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt WebsiteBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: !Sub origin-access-identity/cloudfront/${OriginAccessIdentity}
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        DefaultRootObject: index.html

  AgencyCloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Origins:
          - Id: AgencyS3Origin
            DomainName: !GetAtt WebsiteBucket.RegionalDomainName
            OriginPath: /web-agency
            S3OriginConfig:
              OriginAccessIdentity: !Sub origin-access-identity/cloudfront/${OriginAccessIdentity}
        DefaultCacheBehavior:
          TargetOriginId: AgencyS3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        DefaultRootObject: index.html

  MessagesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: deviceId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: N
      KeySchema:
        - AttributeName: deviceId
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  ConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: connectionId
          AttributeType: S
      KeySchema:
        - AttributeName: connectionId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  DeviceMetadataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: deviceId
          AttributeType: S
      KeySchema:
        - AttributeName: deviceId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  InquiriesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: inquiryId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: N
      KeySchema:
        - AttributeName: inquiryId
          KeyType: HASH
        - AttributeName: createdAt
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ── Payment Portal Tables ─────────────────────────
  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: orderId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: N
      KeySchema:
        - AttributeName: orderId
          KeyType: HASH
        - AttributeName: createdAt
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  InvoicesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: invoiceId
          AttributeType: S
        - AttributeName: orderId
          AttributeType: S
      KeySchema:
        - AttributeName: invoiceId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      GlobalSecondaryIndexes:
        - IndexName: OrderIndex
          KeySchema:
            - AttributeName: orderId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  CustomersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: customerId
          AttributeType: S
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: customerId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      GlobalSecondaryIndexes:
        - IndexName: EmailIndex
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  SubscriptionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: subscriptionId
          AttributeType: S
        - AttributeName: customerId
          AttributeType: S
      KeySchema:
        - AttributeName: subscriptionId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      GlobalSecondaryIndexes:
        - IndexName: CustomerIndex
          KeySchema:
            - AttributeName: customerId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  WebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: StaticSiteWebSocketApi
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: "$request.body.action"

  WebSocketDeployment:
    Type: AWS::ApiGatewayV2::Deployment
    DependsOn:
      - WebSocketRouteConnect
      - WebSocketRouteDisconnect
      - WebSocketApi
    Properties:
      ApiId: !Ref WebSocketApi

  WebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref WebSocketApi
      AutoDeploy: true
      StageName: prod

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: LambdaDDBAndAPIPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Scan
                  - dynamodb:Query
                  - dynamodb:DeleteItem
                Resource: '*'
              - Effect: Allow
                Action:
                  - execute-api:ManageConnections
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: '*'

  ConnectionHandlerFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.9
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 10
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          dynamo = boto3.client('dynamodb')
          TABLE = os.environ.get('CONNECTIONS_TABLE')

          def handler(event, context):
              route = event.get('requestContext', {}).get('routeKey')
              conn = event.get('requestContext', {}).get('connectionId')
              if route == '$connect':
                  dynamo.put_item(TableName=TABLE, Item={'connectionId':{'S':conn}})
                  return {'statusCode':200}
              elif route == '$disconnect':
                  dynamo.delete_item(TableName=TABLE, Key={'connectionId':{'S':conn}})
                  return {'statusCode':200}
              return {'statusCode':200}
      Environment:
        Variables:
          CONNECTIONS_TABLE: !Ref ConnectionsTable

  IotRelayFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.9
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          from botocore.exceptions import ClientError

          ddb = boto3.client('dynamodb')
          TABLE = os.environ.get('MESSAGES_TABLE')
          CONN_TABLE = os.environ.get('CONNECTIONS_TABLE')
          APIGW_ENDPOINT = os.environ.get('APIGW_ENDPOINT')

          def post_to_connection(client, endpoint, connectionId, payload):
              try:
                  client.post_to_connection(Data=json.dumps(payload).encode('utf-8'), ConnectionId=connectionId)
              except ClientError as e:
                  # ignore stale connections
                  if e.response['Error']['Code'] == 'GoneException':
                      ddb.delete_item(TableName=CONN_TABLE, Key={'connectionId':{'S':connectionId}})

          def handler(event, context):
              # IoT sends the MQTT message as event
              import time
              import uuid
              import json
              
              # Extract device ID from payload's 'device' field
              device_id = 'unknown-device'
              
              # Try multiple ways to get the device field
              # Method 1: Check if event is the raw payload (as dict)
              if isinstance(event, dict) and 'device' in event:
                  device_id = event.get('device')
              
              # Method 2: Check if there's a payload field
              payload = event.get('payload')
              if device_id == 'unknown-device' and payload:
                  # If payload is a string, parse it
                  if isinstance(payload, str):
                      try:
                          payload_dict = json.loads(payload)
                          device_id = payload_dict.get('device') or device_id
                      except:
                          # Maybe it's the raw message, try again
                          if 'device' in payload:
                              device_id = payload.get('device')
                  elif isinstance(payload, dict):
                      device_id = payload.get('device') or device_id
              
              # Extract sensor readings
              temperature = None
              humidity = None
              pressure = None
              
              # Try to extract sensor data from various locations
              sensor_source = payload if payload else event
              if isinstance(sensor_source, str):
                  try:
                      sensor_source = json.loads(sensor_source)
                  except:
                      sensor_source = {}
              
              if isinstance(sensor_source, dict):
                  temperature = sensor_source.get('temperature')
                  humidity = sensor_source.get('humidity')
                  pressure = sensor_source.get('pressure')
              
              sensor_payload = event.get('payload')
              if isinstance(sensor_payload, dict):
                  temperature = sensor_payload.get('temperature')
                  humidity = sensor_payload.get('humidity')
                  pressure = sensor_payload.get('pressure')
              elif isinstance(sensor_payload, str):
                  try:
                      sensor_payload_dict = json.loads(sensor_payload)
                      temperature = sensor_payload_dict.get('temperature')
                      humidity = sensor_payload_dict.get('humidity')
                      pressure = sensor_payload_dict.get('pressure')
                  except:
                      pass
              
              # Store message with timestamp and TTL (30 days)
              timestamp = int(time.time() * 1000)  # milliseconds
              ttl = int(time.time()) + (30 * 24 * 60 * 60)  # 30 days from now
              
              item = {
                  'deviceId': {'S': str(device_id)},
                  'timestamp': {'N': str(timestamp)},
                  'id': {'S': str(uuid.uuid4())},
                  'message': {'S': json.dumps(event)},
                  'ttl': {'N': str(ttl)}
              }
              
              # Add sensor readings if available
              if temperature is not None:
                  item['temperature'] = {'N': str(float(temperature))}
              if humidity is not None:
                  item['humidity'] = {'N': str(float(humidity))}
              if pressure is not None:
                  item['pressure'] = {'N': str(float(pressure))}
              
              ddb.put_item(TableName=TABLE, Item=item)

              # broadcast to websocket clients
              # list connections
              resp = ddb.scan(TableName=CONN_TABLE)
              connections = [r['connectionId']['S'] for r in resp.get('Items',[])]
              if connections:
                  apigw = boto3.client('apigatewaymanagementapi', endpoint_url=APIGW_ENDPOINT)
                  payload = {'topic':'esp8266/pub','data':event}
                  for c in connections:
                      post_to_connection(apigw, APIGW_ENDPOINT, c, payload)
              return {}
      Environment:
        Variables:
          MESSAGES_TABLE: !Ref MessagesTable
          CONNECTIONS_TABLE: !Ref ConnectionsTable
          APIGW_ENDPOINT: !Sub https://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod

  WebSocketConnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ConnectionHandlerFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*/*

  WebSocketIntegrationConnect:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ConnectionHandlerFunction.Arn}/invocations

  WebSocketRouteConnect:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $connect
      Target: !Sub integrations/${WebSocketIntegrationConnect}

  WebSocketIntegrationDisconnect:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ConnectionHandlerFunction.Arn}/invocations

  WebSocketRouteDisconnect:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $disconnect
      Target: !Sub integrations/${WebSocketIntegrationDisconnect}

  IoTRuleInvokeLambda:
    Type: AWS::IoT::TopicRule
    Properties:
      TopicRulePayload:
        RuleDisabled: false
        Sql: "SELECT * FROM 'esp8266/pub'"
        Actions:
          - Lambda:
              FunctionArn: !GetAtt IotRelayFunction.Arn

  AllowIoTInvokeLambda:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref IotRelayFunction
      Action: lambda:InvokeFunction
      Principal: iot.amazonaws.com

  QueryFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.9
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 10
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          from decimal import Decimal

          ddb = boto3.client('dynamodb')
          TABLE = os.environ.get('MESSAGES_TABLE')

          class DecimalEncoder(json.JSONEncoder):
              def default(self, o):
                  if isinstance(o, Decimal):
                      return float(o)
                  return super().default(o)

          def get_devices():
              """Scan table and return all unique device IDs"""
              try:
                  devices = set()
                  params = {
                      'TableName': TABLE,
                      'ProjectionExpression': 'deviceId'
                  }
                  
                  while True:
                      resp = ddb.scan(**params)
                      for item in resp.get('Items', []):
                          devices.add(item.get('deviceId', {}).get('S', 'unknown'))
                      
                      if 'LastEvaluatedKey' not in resp:
                          break
                      params['ExclusiveStartKey'] = resp['LastEvaluatedKey']
                  
                  return {
                      'statusCode': 200,
                      'body': json.dumps({
                          'devices': sorted(list(devices)),
                          'count': len(devices)
                      })
                  }
              except Exception as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps({'error': str(e)})
                  }

          def get_messages(device_id, limit=100):
              """Query messages for a specific device"""
              try:
                  limit = min(int(limit), 1000)  # Max 1000 items
                  
                  resp = ddb.query(
                      TableName=TABLE,
                      KeyConditionExpression='deviceId = :device_id',
                      ExpressionAttributeValues={
                          ':device_id': {'S': device_id}
                      },
                      ScanIndexForward=False,  # Latest first
                      Limit=limit
                  )

                  items = []
                  for item in resp.get('Items', []):
                      msg = {
                          'id': item.get('id', {}).get('S', ''),
                          'deviceId': item.get('deviceId', {}).get('S', ''),
                          'timestamp': int(item.get('timestamp', {}).get('N', '0')),
                          'message': json.loads(item.get('message', {}).get('S', '{}'))
                      }
                      # Add sensor readings if available
                      if 'temperature' in item:
                          msg['temperature'] = float(item['temperature']['N'])
                      if 'humidity' in item:
                          msg['humidity'] = float(item['humidity']['N'])
                      if 'pressure' in item:
                          msg['pressure'] = float(item['pressure']['N'])
                      items.append(msg)

                  return {
                      'statusCode': 200,
                      'body': json.dumps({
                          'deviceId': device_id,
                          'count': len(items),
                          'messages': items
                      }, cls=DecimalEncoder)
                  }
              except Exception as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps({'error': str(e)})
                  }

          def handler(event, context):
              """Route handler for /devices and /messages endpoints"""
              # HTTP API sends path in rawPath
              path = event.get('rawPath', event.get('path', ''))
              params = event.get('queryStringParameters') or {}
              
              if path.endswith('/devices') or path == '/devices':
                  return get_devices()
              elif path.endswith('/messages') or path == '/messages':
                  device_id = params.get('deviceId', 'unknown')
                  limit = params.get('limit', '100')
                  return get_messages(device_id, limit)
              else:
                  return {
                      'statusCode': 404,
                      'body': json.dumps({'error': 'Not found', 'path': path})
                  }
      Environment:
        Variables:
          MESSAGES_TABLE: !Ref MessagesTable

  GetDeviceMetadataFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.9
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 10
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          ddb = boto3.client('dynamodb')
          TABLE = os.environ.get('METADATA_TABLE')

          def handler(event, context):
              try:
                  path = event.get('rawPath', '')
                  method = event.get('requestContext', {}).get('http', {}).get('method', 'UNKNOWN')
                  params = event.get('queryStringParameters', {}) or {}
                  
                  # Log for debugging
                  print(f"Path: {path}, Method: {method}")
                  print(f"Params: {params}")
                  print(f"Event keys: {event.keys()}")
                  
                  # Handle GET /device-metadata
                  if (path == '/device-metadata' or path.endswith('/device-metadata')) and method == 'GET':
                      device_id = params.get('deviceId')
                      if not device_id:
                          return {'statusCode': 400, 'body': json.dumps({'error': 'Missing deviceId'})}
                      
                      response = ddb.get_item(TableName=TABLE, Key={'deviceId': {'S': device_id}})
                      if 'Item' in response:
                          item = response['Item']
                          return {
                              'statusCode': 200,
                              'body': json.dumps({
                                  'deviceId': item.get('deviceId', {}).get('S', ''),
                                  'name': item.get('name', {}).get('S', ''),
                                  'location': item.get('location', {}).get('S', ''),
                                  'description': item.get('description', {}).get('S', ''),
                                  'sensorType': item.get('sensorType', {}).get('S', ''),
                                  'firmwareVersion': item.get('firmwareVersion', {}).get('S', '')
                              })
                          }
                      else:
                          return {
                              'statusCode': 200,
                              'body': json.dumps({
                                  'deviceId': device_id,
                                  'name': '',
                                  'location': '',
                                  'description': '',
                                  'sensorType': '',
                                  'firmwareVersion': ''
                              })
                          }
                  else:
                      return {'statusCode': 404, 'body': json.dumps({'error': f'Not found: {method} {path}'})}
              except Exception as e:
                  print(f"Error: {str(e)}")
                  return {'statusCode': 500, 'body': json.dumps({'error': str(e)})}
      Environment:
        Variables:
          METADATA_TABLE: !Ref DeviceMetadataTable

  UpdateDeviceMetadataFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.9
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 10
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          ddb = boto3.client('dynamodb')
          TABLE = os.environ.get('METADATA_TABLE')

          def handler(event, context):
              try:
                  path = event.get('rawPath', '')
                  method = event.get('requestContext', {}).get('http', {}).get('method', 'UNKNOWN')
                  
                  # Log for debugging
                  print(f"Path: {path}, Method: {method}")
                  print(f"Event keys: {event.keys()}")
                  
                  # Handle POST to /device-metadata
                  if (path == '/device-metadata' or path.endswith('/device-metadata')) and method == 'POST':
                      body = json.loads(event.get('body', '{}'))
                      device_id = body.get('deviceId')
                      
                      if not device_id:
                          return {'statusCode': 400, 'body': json.dumps({'error': 'Missing deviceId'})}
                      
                      item = {'deviceId': {'S': device_id}}
                      for key in ['name', 'location', 'description', 'sensorType', 'firmwareVersion']:
                          if key in body and body[key]:
                              item[key] = {'S': str(body[key])}
                      
                      ddb.put_item(TableName=TABLE, Item=item)
                      return {'statusCode': 200, 'body': json.dumps({'success': True, 'deviceId': device_id})}
                  else:
                      return {'statusCode': 404, 'body': json.dumps({'error': f'Not found: {method} {path}'})}
              except Exception as e:
                  print(f"Error: {str(e)}")
                  return {'statusCode': 500, 'body': json.dumps({'error': str(e)})}
      Environment:
        Variables:
          METADATA_TABLE: !Ref DeviceMetadataTable

  InquiryFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.9
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          import uuid
          import time

          ddb = boto3.client('dynamodb')
          ses = boto3.client('ses')
          TABLE = os.environ.get('INQUIRIES_TABLE')
          SENDER_EMAIL = 'inquiry@angelorumsolutions.com'

          def send_customer_email(customer_name, customer_email):
              """Send confirmation email to customer"""
              try:
                  ses.send_email(
                      Source=SENDER_EMAIL,
                      Destination={'ToAddresses': [customer_email]},
                      Message={
                          'Subject': {'Data': 'We Received Your Inquiry - Angelorum Solutions'},
                          'Body': {
                              'Html': {
                                  'Data': f"""
                                  <html>
                                    <body style="font-family: Inter, sans-serif; color: #333;">
                                      <h2>Thank you, {customer_name}!</h2>
                                      <p>We've received your inquiry and will review it shortly.</p>
                                      <p>Our team typically responds within 24 hours.</p>
                                      <hr style="border: none; border-top: 1px solid #ddd; margin: 20px 0;">
                                      <p style="color: #666; font-size: 12px;">
                                        <strong>Angelorum Solutions</strong><br>
                                        Professional Websites for Small Businesses<br>
                                        inquiry@angelorumsolutions.com
                                      </p>
                                    </body>
                                  </html>
                                  """
                              }
                          }
                      }
                  )
                  return True
              except Exception as e:
                  print(f"Error sending customer email: {str(e)}")
                  return False

          def send_notification_email(inquiry_id, business_name, name, email, phone, details):
              """Send notification email to Angelorum"""
              try:
                  ses.send_email(
                      Source=SENDER_EMAIL,
                      Destination={'ToAddresses': [SENDER_EMAIL]},
                      Message={
                          'Subject': {'Data': f'New Inquiry: {business_name}'},
                          'Body': {
                              'Html': {
                                  'Data': f"""
                                  <html>
                                    <body style="font-family: Inter, sans-serif;">
                                      <h3>New Inquiry Received</h3>
                                      <p><strong>ID:</strong> {inquiry_id}</p>
                                      <p><strong>Business Name:</strong> {business_name}</p>
                                      <p><strong>Contact Name:</strong> {name}</p>
                                      <p><strong>Email:</strong> {email}</p>
                                      <p><strong>Phone:</strong> {phone if phone else 'Not provided'}</p>
                                      <hr style="border: none; border-top: 1px solid #ddd; margin: 20px 0;">
                                      <h4>Project Details:</h4>
                                      <p>{details.replace(chr(10), '<br>')}</p>
                                    </body>
                                  </html>
                                  """
                              }
                          }
                      }
                  )
                  return True
              except Exception as e:
                  print(f"Error sending notification email: {str(e)}")
                  return False

          def handler(event, context):
              try:
                  method = event.get('requestContext', {}).get('http', {}).get('method', 'UNKNOWN')
                  
                  # Only handle POST requests
                  if method != 'POST':
                      return {
                          'statusCode': 405,
                          'body': json.dumps({'error': 'Method not allowed'}),
                          'headers': {'Content-Type': 'application/json'}
                      }
                  
                  # Parse request body
                  body = json.loads(event.get('body', '{}'))
                  
                  # Validate required fields
                  required_fields = ['businessName', 'name', 'email', 'details']
                  missing = [f for f in required_fields if not body.get(f)]
                  
                  if missing:
                      return {
                          'statusCode': 400,
                          'body': json.dumps({'error': f'Missing required fields: {", ".join(missing)}'}),
                          'headers': {'Content-Type': 'application/json'}
                      }
                  
                  # Basic email validation
                  email = body.get('email', '').strip()
                  if '@' not in email or '.' not in email.split('@')[1]:
                      return {
                          'statusCode': 400,
                          'body': json.dumps({'error': 'Invalid email address'}),
                          'headers': {'Content-Type': 'application/json'}
                      }
                  
                  # Create inquiry record
                  inquiry_id = str(uuid.uuid4())
                  created_at = int(time.time() * 1000)
                  ttl = int(time.time()) + (90 * 24 * 60 * 60)  # 90 days
                  
                  item = {
                      'inquiryId': {'S': inquiry_id},
                      'createdAt': {'N': str(created_at)},
                      'businessName': {'S': str(body.get('businessName', ''))},
                      'name': {'S': str(body.get('name', ''))},
                      'email': {'S': str(body.get('email', ''))},
                      'phone': {'S': str(body.get('phone', ''))},
                      'details': {'S': str(body.get('details', ''))},
                      'ttl': {'N': str(ttl)}
                  }
                  
                  # Store in DynamoDB
                  ddb.put_item(TableName=TABLE, Item=item)
                  
                  # Send emails
                  send_customer_email(name, email)
                  send_notification_email(inquiry_id, business_name, name, email, body.get('phone', ''), details)
                  
                  return {
                      'statusCode': 200,
                      'body': json.dumps({
                          'success': True,
                          'message': 'Inquiry received! We will contact you soon.',
                          'inquiryId': inquiry_id
                      }),
                      'headers': {
                          'Content-Type': 'application/json',
                          'Access-Control-Allow-Origin': '*'
                      }
                  }
              
              except json.JSONDecodeError:
                  return {
                      'statusCode': 400,
                      'body': json.dumps({'error': 'Invalid JSON in request body'}),
                      'headers': {'Content-Type': 'application/json'}
                  }
              except Exception as e:
                  print(f"Error handling inquiry: {str(e)}")
                  return {
                      'statusCode': 500,
                      'body': json.dumps({'error': 'Internal server error'}),
                      'headers': {'Content-Type': 'application/json'}
                  }
      Environment:
        Variables:
          INQUIRIES_TABLE: !Ref InquiriesTable

