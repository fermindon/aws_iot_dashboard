<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>IoT Dashboard</title>
    <link rel="stylesheet" href="/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>📊 IoT Device Dashboard</h1>
        <div class="header-controls">
          <button id="dark-mode-toggle" class="btn btn-secondary" title="Toggle dark mode">🌙</button>
          <button id="ws-start" class="btn btn-primary">Connect WebSocket</button>
          <span id="connection-status" class="status-badge disconnected">Disconnected</span>
        </div>
      </header>

      <div class="dashboard">
        <aside class="sidebar">
          <h2>Devices</h2>
          <div id="device-list" class="device-list"></div>
          <div class="device-stats">
            <p><strong>Total Devices:</strong> <span id="device-count">0</span></p>
            <p><strong>Last Update:</strong> <span id="last-update">--</span></p>
          </div>
        </aside>

        <main class="main-content">
          <section class="device-details">
            <div id="device-header" class="device-header">
              <h2>Select a device to view details</h2>
            </div>
            
            <div id="device-metrics" class="metrics-grid" style="display:none;">
              <div class="metric-card">
                <label>Total Messages</label>
                <p id="metric-count" class="metric-value">0</p>
              </div>
              <div class="metric-card">
                <label>Date Range</label>
                <p id="metric-date-range" class="metric-value">--</p>
              </div>
              <div class="metric-card">
                <label>Last Update</label>
                <p id="metric-last-update" class="metric-value">--</p>
              </div>
            </div>

            <div id="tabs-container" style="display:none;">
              <div class="tabs">
                <button class="tab-btn active" data-tab="temperature">🌡️ Temperature</button>
                <button class="tab-btn" data-tab="humidity">💧 Humidity</button>
                <button class="tab-btn" data-tab="pressure">🔵 Pressure</button>
                <button class="tab-btn" data-tab="info">ℹ️ Device Info</button>
              </div>

              <div id="temperature-tab" class="tab-content active">
                <div class="chart-container">
                  <h3>Temperature vs Time</h3>
                  <canvas id="temperature-chart"></canvas>
                </div>
              </div>

              <div id="humidity-tab" class="tab-content">
                <div class="chart-container">
                  <h3>Humidity vs Time</h3>
                  <canvas id="humidity-chart"></canvas>
                </div>
              </div>

              <div id="pressure-tab" class="tab-content">
                <div class="chart-container">
                  <h3>Pressure vs Time</h3>
                  <canvas id="pressure-chart"></canvas>
                </div>
              </div>

              <div id="info-tab" class="tab-content">
                <div class="info-container">
                  <form id="device-info-form">
                    <div class="form-group">
                      <label for="info-name">Device Name:</label>
                      <input type="text" id="info-name" placeholder="e.g., Living Room Sensor" />
                    </div>
                    <div class="form-group">
                      <label for="info-location">Physical Location:</label>
                      <input type="text" id="info-location" placeholder="e.g., 123 Main St, Home" />
                    </div>
                    <div class="form-group">
                      <label for="info-description">Description:</label>
                      <textarea id="info-description" placeholder="Notes about this device..."></textarea>
                    </div>
                    <div class="form-group">
                      <label for="info-sensor-type">Sensor Type:</label>
                      <input type="text" id="info-sensor-type" placeholder="e.g., DHT22, BME680" />
                    </div>
                    <div class="form-group">
                      <label for="info-firmware">Firmware Version:</label>
                      <input type="text" id="info-firmware" placeholder="e.g., 1.0.0" />
                    </div>
                    <button type="button" id="save-device-info" class="btn btn-primary">Save Device Info</button>
                    <span id="save-status"></span>
                  </form>
                </div>
              </div>
            </div>
          </section>

          <section class="raw-messages">
            <h2>Raw Messages</h2>
            <div id="messages" class="messages-list"></div>
          </section>
        </main>
      </div>
    </div>

    <!-- Modal for displaying raw message -->
    <div id="message-modal" class="modal" style="display:none;">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Raw Message</h2>
          <button class="modal-close" onclick="document.getElementById('message-modal').style.display='none'">&times;</button>
        </div>
        <div class="modal-body">
          <pre id="message-content"></pre>
        </div>
      </div>
    </div>

    <script src="/js/mqtt_relay.js"></script>
    <script src="/js/dashboard.js"></script>
  </body>
</html>
